root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/server ./cmd/server/main.go"
entrypoint = "./tmp/server"
exclude_dir = ["tmp", "assets", "tests", "docs", "docker"]
exclude_regex = ["_test\\.go"]
exclude_unchanged = true
include_ext = ["go", "tpl", "tmpl", "html"]
log = "build-errors.log"
stop_on_error = false

poll = true
poll_interval = 500 # milissegundos

[color]
app = "blue"
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"